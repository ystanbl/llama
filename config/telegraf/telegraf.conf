[global_tags]
  # Uses system hostname automatically (omit to use os.Hostname())

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"

###############################################################################
#                            OUTPUT PLUGINS                                   #
###############################################################################

[[outputs.influxdb]]
  urls = ["http://127.0.0.1:8086"]
  database = "telegraf"
  retention_policy = "autogen"

###############################################################################
#                            INPUT PLUGINS                                    #
###############################################################################

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.mem]]

[[inputs.swap]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.diskio]]

[[inputs.net]]
  interfaces = ["eth*", "en*"]

[[inputs.system]]

[[inputs.processes]]

# Monitor our specific services by process name
[[inputs.procstat]]
  pattern = "python.*app.py"
  prefix = "unified_chat"

[[inputs.procstat]]
  pattern = "python.*launch.py"
  prefix = "sd_webui"

[[inputs.procstat]]
  pattern = "ollama"
  prefix = "ollama"
